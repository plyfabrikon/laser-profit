<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porównywarka Laserów 2026 | LaserProfit.eu</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1b2e;--card:#132237;--card2:#1a2f47;--orange:#ff6b2b;--navy:#1e3a5f;--text:#e8f0fe;--muted:#7a91b0;--border:#1e3352;--font:'Poppins',sans-serif;--green:#34d399}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px; line-height: 1.5}

/* NAV & HERO */
nav{background:rgba(13,27,46,.97);padding:12px 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:300;backdrop-filter:blur(12px)}
.nav-content{max-width:1200px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between}
.logo{font-weight:700;color:var(--orange);text-decoration:none;letter-spacing:1px}
.hero{padding:30px 16px; text-align:center; max-width: 1200px; margin: 0 auto;}
.hero h1{font-size: 1.6rem; color: var(--orange); margin-bottom: 8px}

/* FILTRY */
.filters{max-width:1200px;margin:0 auto;padding:0 16px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:.65rem;color:var(--orange);text-transform:uppercase;font-weight:700}
.fg select, .fg input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-family:var(--font)}

/* TABELA BEZ SCROLLA */
.table-wrap{max-width:1200px;margin:0 auto;padding:0 10px 100px; overflow: hidden;} /* Brak scrolla */
table{width:100%; border-collapse:collapse; background:var(--card); border-radius:8px; table-layout: fixed;} /* fixed zapobiega rozpychaniu */
thead tr{background:var(--navy); border-bottom:2px solid var(--orange)}
th{padding:12px 8px; text-align:left; font-size:.65rem; color:var(--orange); text-transform:uppercase}
td{padding:12px 8px; border-bottom:1px solid var(--border); vertical-align:middle; overflow: hidden; text-overflow: ellipsis;}

/* SZEROKOŚCI KOLUMN */
th:nth-child(1), td:nth-child(1) { width: 40%; } /* Model */
th:nth-child(2), td:nth-child(2) { width: 15%; } /* Moc */
th:nth-child(3), td:nth-child(3) { width: 20%; } /* Cena */
th:nth-child(4), td:nth-child(4) { width: 25%; } /* Akcja */

/* MODELE I PRZYCISKI */
.model-name{font-weight:600; display:block; margin-bottom: 4px}
.expand-btn{background:var(--card2); border:1px solid var(--orange); color:var(--orange); padding:4px 8px; border-radius:4px; font-size:.6rem; cursor:pointer; font-weight: 600}
.expand-btn:hover{background:var(--orange); color:white}

/* ROZWINIĘTE DETALE */
.detail-row td { background: #0a1624; padding: 15px; border-top: none; }
.detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.di { background: var(--card2); padding: 8px; border-radius: 6px; border: 1px solid var(--border); }
.di-lbl { font-size: .55rem; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
.di-val { font-size: .75rem; font-weight: 600; color: var(--text); }

/* PRZYCISKI AKCJI */
.btn-aff{display:block; background:var(--orange); color:#fff; text-decoration:none; padding:8px; border-radius:6px; font-size:.7rem; font-weight:700; text-align:center; margin-bottom:5px}
.btn-add-compare{background:none; border:1px solid var(--border); color:var(--muted); padding:6px; border-radius:6px; font-size:.6rem; cursor:pointer; width:100%}
.btn-add-compare.added{border-color:var(--green); color:var(--green)}

/* RESPONSYWNOŚĆ MOBILNA */
@media (max-width: 600px) {
    th:nth-child(3), td:nth-child(3) { display: none; } /* Ukrywamy obszar na mobile w głównej tabeli */
    th:nth-child(1), td:nth-child(1) { width: 50%; }
    th:nth-child(2), td:nth-child(2) { width: 20%; }
    th:nth-child(4), td:nth-child(4) { width: 30%; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-content">
    <a href="#" class="logo">⚡ LASERPROFIT.EU</a>
    <div id="compareBar" style="display:none">
        <button class="expand-btn" onclick="openCompare()">⚖️ Porównaj (<span id="compareCount">0</span>)</button>
    </div>
  </div>
</nav>

<div class="hero">
  <h1>🔬 Porównywarka Laserów</h1>
  <p id="rateInfo" style="font-size: 0.7rem; color: var(--muted)">Ładowanie danych...</p>
</div>

<div class="filters">
  <div class="fg"><label>🔍 Szukaj</label><input type="text" id="search" oninput="applyFilters()" placeholder="Wpisz model..."></div>
  <div class="fg"><label>💰 Max Cena</label>
    <select id="fPrice" onchange="applyFilters()">
        <option value="">Wszystkie</option>
        <option value="500">do 500€</option>
        <option value="1000">do 1000€</option>
        <option value="2000">do 2000€</option>
    </select>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Model</th>
        <th>Moc</th>
        <th>Cena</th>
        <th>Akcja</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTPmn9gQumk_QDGRqfBdl1gSPKJ2wP8kRARb5UZc0NdQglJA-Y3e1Wpv96YvcpJkonVNJk9RXKbXboM/pub?output=csv';
let LASERS = [];
let rateEUR = 4.30;
let expandedRows = new Set();
let compareSet = new Set();

async function loadData() {
    try {
        const r = await fetch('https://api.exchangerate-api.com/v4/latest/EUR');
        const d = await r.json();
        rateEUR = d.rates.PLN;
        document.getElementById('rateInfo').innerHTML = `Aktualny kurs: 1 EUR = ${rateEUR.toFixed(2)} PLN`;
    } catch(e) {}

    Papa.parse(SHEET_URL, {
        download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
        complete: function(results) {
            LASERS = results.data;
            applyFilters();
        }
    });
}

function toggleDetails(id) {
    if(expandedRows.has(id)) expandedRows.delete(id);
    else expandedRows.add(id);
    applyFilters();
}

function applyFilters() {
    const search = document.getElementById('search').value.toLowerCase();
    const fPrice = parseFloat(document.getElementById('fPrice').value) || Infinity;

    const filtered = LASERS.filter(l => {
        const name = (l.brand + ' ' + l.name).toLowerCase();
        return name.includes(search) && l.priceEur <= fPrice;
    });

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = filtered.map(l => {
        const isExp = expandedRows.has(l.id);
        const pln = Math.round(l.priceEur * rateEUR).toLocaleString();

        let row = `
        <tr>
            <td>
                <span class="model-name">${l.brand} ${l.name}</span>
                <button class="expand-btn" onclick="toggleDetails(${l.id})">
                    ${isExp ? '▲ Ukryj' : '▼ Parametry'}
                </button>
            </td>
            <td style="font-weight:700; color:var(--orange)">${l.power}W</td>
            <td>
                <span style="font-weight:700">${l.priceEur}€</span><br>
                <small style="color:var(--muted)">${pln} zł</small>
            </td>
            <td>
                <a href="${l.affLink}" target="_blank" class="btn-aff">KUP</a>
                <button class="btn-add-compare ${compareSet.has(l.id) ? 'added' : ''}" onclick="toggleCompare(${l.id})">
                    ${compareSet.has(l.id) ? '✓' : '⊕'}
                </button>
            </td>
        </tr>`;

        if(isExp) {
            row += `
            <tr class="detail-row">
                <td colspan="4">
                    <div class="detail-grid">
                        <div class="di"><div class="di-lbl">Obszar roboczy</div><div class="di-val">${l.areaW}x${l.areaH} mm</div></div>
                        <div class="di"><div class="di-lbl">Grubość cięcia</div><div class="di-val">${l.cutDepth || '-'} mm</div></div>
                        <div class="di"><div class="di-lbl">Air Assist</div><div class="di-val">${l.airAssist === 'builtin' ? 'Tak' : 'Nie'}</div></div>
                        <div class="di"><div class="di-lbl">Gwarancja</div><div class="di-val">${l.warranty || '12'} m-cy</div></div>
                    </div>
                </td>
            </tr>`;
        }
        return row;
    }).join('');
}

function toggleCompare(id) {
    if(compareSet.has(id)) compareSet.delete(id);
    else compareSet.add(id);
    document.getElementById('compareBar').style.display = compareSet.size > 0 ? 'block' : 'none';
    document.getElementById('compareCount').textContent = compareSet.size;
    applyFilters();
}

loadData();
</script>
</body>
</html>
