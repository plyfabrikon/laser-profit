<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porównywarka Laserów 2026 | LaserProfit.eu</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1b2e;--card:#132237;--card2:#1a2f47;--orange:#ff6b2b;--navy:#1e3a5f;--text:#e8f0fe;--muted:#7a91b0;--border:#1e3352;--input-bg:#0a1624;--font:'Poppins',sans-serif;--green:#34d399;--red:#f87171;--blue:#38bdf8;--purple:#a855f7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}

/* NAVIGATION & HERO */
nav{background:rgba(13,27,46,.97);padding:12px 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:300;backdrop-filter:blur(12px)}
.nav-content{max-width:1300px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-weight:700;font-size:.9rem;color:var(--orange);text-decoration:none;letter-spacing:1.5px}
.hero{max-width:1300px;margin:0 auto;padding:32px 16px 20px;text-align:center}
.hero h1{font-size:clamp(1.2rem,2.5vw,1.8rem);color:var(--orange);margin-bottom:6px}
.rate-info{font-size:.68rem;color:var(--muted);margin-top:6px}
.rate-info span{color:var(--green)}

/* BRANDS */
.brand-header { max-width: 1300px; margin: 0 auto 20px; padding: 0 16px; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
.brand-badge { background: var(--card); border: 1px solid var(--border); padding: 8px 20px; border-radius: 10px; font-weight: 700; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; transition: all 0.3s ease; }
.brand-badge.highlight { border-color: var(--orange); color: var(--orange); background: rgba(255, 107, 43, 0.05); }

/* FILTERS */
.filters{max-width:1300px;margin:0 auto;padding:0 16px 18px;display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:.6rem;color:var(--orange);text-transform:uppercase;font-weight:700}
.fg select, .fg input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 9px;border-radius:7px;font-size:.72rem}

/* TABLE CORE - ZMNIEJSZONA SZEROKOŚĆ */
.table-wrap{max-width:1300px;margin:0 auto;padding:0 16px 60px;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;min-width:800px} /* ZMNIEJSZONE Z 1500px */
thead tr{background:var(--navy);border-bottom:2px solid var(--orange)}
th{padding:12px 10px;text-align:left;font-size:.65rem;color:var(--orange);text-transform:uppercase;font-weight:700}
td{padding:12px 10px;border-bottom:1px solid var(--border);vertical-align:middle}

/* MODEL & BUTTONS */
.model-cell{display:flex;flex-direction:column;gap:2px}
.model-name{font-weight:700;font-size:.85rem}
.expand-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 8px;border-radius:5px;font-size:.6rem;cursor:pointer;margin-top:5px;width:fit-content;transition:.2s}
.expand-btn:hover{border-color:var(--orange);color:var(--orange)}

/* DETAIL ROW - TO CO BYŁO WIDOCZNE WCZEŚNIEJ */
.detail-row td{background:rgba(14,30,52,0.8);padding:20px;border-top:none}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:15px}
.di{background:var(--card2);padding:10px;border-radius:8px;border:1px solid var(--border)}
.di-lbl{font-size:.55rem;color:var(--orange);text-transform:uppercase;margin-bottom:4px}
.di-val{font-size:.75rem;font-weight:600}

/* COMPARE BAR */
.compare-bar{display:none;align-items:center;gap:10px;background:rgba(255,107,43,.12);border:1px solid var(--orange);padding:6px 14px;border-radius:8px;font-size:.72rem}
.compare-bar.show{display:flex}
.btn-compare-show{background:var(--orange);color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:.7rem;font-weight:700;cursor:pointer}

/* PRICES & ACTIONS */
.price-eur{font-weight:700;font-size:.9rem;color:var(--orange)}
.btn-aff{display:block;background:var(--orange);color:#fff;text-decoration:none;padding:6px 12px;border-radius:6px;font-size:.7rem;font-weight:700;text-align:center;margin-bottom:5px}
.btn-add-compare{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 8px;border-radius:5px;font-size:.6rem;cursor:pointer;width:100%}
.btn-add-compare.added{background:var(--orange);color:#fff;border-color:var(--orange)}

/* POPUP */
.popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center;padding:20px}
.popup-bg.open{display:flex}
.popup{background:var(--card);border-radius:14px;border:1px solid var(--orange);max-width:900px;width:100%;padding:24px;position:relative}
.cmp-table{width:100%;border-collapse:collapse}
.cmp-table td, .cmp-table th{padding:10px;border:1px solid var(--border);text-align:center}
</style>
</head>
<body>

<nav>
  <div class="nav-content">
    <a href="#" class="logo">⚡ LASERPROFIT.EU</a>
    <div class="compare-bar" id="compareBar">
      <span id="compareCount">0</span> do porównania
      <button class="btn-compare-show" onclick="openCompare()">⚖️ Porównaj</button>
      <button onclick="clearCompare()" style="background:none; border:none; color:var(--muted); cursor:pointer">✕</button>
    </div>
    <a href="https://laserprofit.eu" style="color:var(--muted); text-decoration:none; font-size:.7rem">← Kalkulator</a>
  </div>
</nav>

<div class="hero">
  <h1>🔬 Porównywarka Laserów 2026</h1>
  <p class="rate-info" id="rateInfo">Ładowanie kursów...</p>
</div>

<div class="brand-header">
  <div class="brand-badge">xTool</div><div class="brand-badge">Creality</div><div class="brand-badge highlight">Ortur</div><div class="brand-badge">Atomstack</div><div class="brand-badge">Sculpfun</div>
</div>

<div class="filters">
  <div class="fg"><label>🔍 Szukaj</label><input type="text" id="search" oninput="applyFilters()"></div>
  <div class="fg"><label>⚡ Typ</label><select id="fType" onchange="applyFilters()"><option value="">Wszystkie</option><option value="diode">Diodowy</option><option value="fiber">Fiber</option></select></div>
  <div class="fg"><label>💰 Max Cena</label><select id="fPrice" onchange="applyFilters()"><option value="">Każda</option><option value="500">do 500€</option><option value="1000">do 1000€</option></select></div>
  <span class="results-count" id="resCount" style="margin-left:auto; font-size:.7rem; color:var(--muted)"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>MODEL LASERA</th>
        <th>MOC</th>
        <th>OBSZAR</th>
        <th>CENA (EUR/PLN)</th>
        <th>AKCJA</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="popup-bg" id="popupBg" onclick="if(event.target===this)closeCompare()">
  <div class="popup">
    <h2 style="color:var(--orange); margin-bottom:15px">⚖️ Porównanie</h2>
    <div style="overflow-x:auto"><table id="cmpTable" class="cmp-table"></table></div>
    <button onclick="closeCompare()" style="margin-top:20px; padding:10px 20px; background:var(--navy); color:white; border:none; border-radius:5px; cursor:pointer">Zamknij</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTPmn9gQumk_QDGRqfBdl1gSPKJ2wP8kRARb5UZc0NdQglJA-Y3e1Wpv96YvcpJkonVNJk9RXKbXboM/pub?output=csv';
let LASERS = [];
let rateEUR = 4.30;
let compareSet = new Set();
let expandedRows = new Set();

async function loadData() {
    try {
        const r = await fetch('https://api.exchangerate-api.com/v4/latest/EUR');
        const d = await r.json();
        rateEUR = d.rates.PLN;
        document.getElementById('rateInfo').innerHTML = `Kurs: 1 EUR = <span>${rateEUR.toFixed(2)} PLN</span>`;
    } catch(e) {}

    Papa.parse(SHEET_URL, {
        download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
        complete: function(results) {
            LASERS = results.data;
            applyFilters();
        }
    });
}

function toggleDetails(id) {
    if(expandedRows.has(id)) expandedRows.delete(id);
    else expandedRows.add(id);
    applyFilters();
}

function toggleCompare(id) {
    if(compareSet.has(id)) compareSet.delete(id);
    else if(compareSet.size < 4) compareSet.add(id);
    else alert("Max 4 lasery!");
    applyFilters();
}

function applyFilters() {
    const search = document.getElementById('search').value.toLowerCase();
    const fType = document.getElementById('fType').value;
    const fPrice = parseFloat(document.getElementById('fPrice').value) || Infinity;

    const filtered = LASERS.filter(l => {
        const name = (l.brand + ' ' + l.name).toLowerCase();
        if(search && !name.includes(search)) return false;
        if(fType && l.type !== fType) return false;
        if(l.priceEur > fPrice) return false;
        return true;
    });

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = filtered.map(l => {
        const inCmp = compareSet.has(l.id);
        const isExp = expandedRows.has(l.id);
        const pln = Math.round(l.priceEur * rateEUR).toLocaleString();

        let row = `
        <tr class="${inCmp ? 'in-compare' : ''}">
            <td>
                <div class="model-cell">
                    <span class="model-name">${l.brand} ${l.name}</span>
                    <button class="expand-btn" onclick="toggleDetails(${l.id})">
                        ${isExp ? '▲ Ukryj' : '▼ Parametry'}
                    </button>
                </div>
            </td>
            <td class="power-cell" style="color:var(--orange); font-weight:700">${l.power}W</td>
            <td>${l.areaW}x${l.areaH} mm</td>
            <td>
                <span class="price-eur">${l.priceEur}€</span><br>
                <small style="color:var(--muted)">≈ ${pln} zł</small>
            </td>
            <td>
                <a href="${l.affLink}" target="_blank" class="btn-aff">KUP TERAZ</a>
                <button class="btn-add-compare ${inCmp ? 'added' : ''}" onclick="toggleCompare(${l.id})">
                    ${inCmp ? '✓ W liście' : '⊕ Porównaj'}
                </button>
            </td>
        </tr>`;

        if(isExp) {
            row += `
            <tr class="detail-row">
                <td colspan="5">
                    <div class="detail-grid">
                        <div class="di"><div class="di-lbl">Grubość cięcia</div><div class="di-val">${l.cutDepth || '-'} mm</div></div>
                        <div class="di"><div class="di-lbl">Air Assist</div><div class="di-val">${l.airAssist === 'builtin' ? '✅ Tak' : '❌ Nie'}</div></div>
                        <div class="di"><div class="di-lbl">Obudowa</div><div class="di-val">${l.enclosed ? '🔒 Tak' : 'Nie'}</div></div>
                        <div class="di"><div class="di-lbl">Wysyłka</div><div class="di-val">${l.shipFrom || 'CN'}</div></div>
                        <div class="di"><div class="di-lbl">Połączenie</div><div class="di-val">${l.conn || 'USB'}</div></div>
                    </div>
                </td>
            </tr>`;
        }
        return row;
    }).join('');

    const bar = document.getElementById('compareBar');
    bar.classList.toggle('show', compareSet.size > 0);
    document.getElementById('compareCount').textContent = compareSet.size;
    document.getElementById('resCount').textContent = `Wyniki: ${filtered.length}`;
}

function openCompare() {
    const items = LASERS.filter(l => compareSet.has(l.id));
    let html = `<tr><th>Cecha</th>` + items.map(l => `<th>${l.name}</th>`).join('') + `</tr>`;
    
    const fields = [['Moc', 'power'], ['Obszar', 'areaW'], ['Cena', 'priceEur']];
    fields.forEach(f => {
        html += `<tr><td>${f[0]}</td>` + items.map(l => `<td>${l[f[1]]}</td>`).join('') + `</tr>`;
    });

    document.getElementById('cmpTable').innerHTML = html;
    document.getElementById('popupBg').classList.add('open');
}

function closeCompare() { document.getElementById('popupBg').classList.remove('open'); }
function clearCompare() { compareSet.clear(); applyFilters(); }

loadData();
</script>
</body>
</html>
